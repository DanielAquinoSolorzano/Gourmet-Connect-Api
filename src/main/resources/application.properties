# ===================================================================
# CONFIGURACIÓN GENERAL DE LA APLICACIÓN
# ===================================================================
spring.application.name=GourmetConnectApi

# ===================================================================
# CONEXIÓN DINÁMICA A MONGODB (Para Azure VM / Docker)
# ===================================================================
# Construimos la URI usando las variables exactas del entorno de la VM
spring.mongodb.uri=mongodb://${SPRING_DATA_MONGODB_USERNAME}:${SPRING_DATA_MONGODB_PASSWORD}@${SPRING_DATA_MONGODB_HOST}:${SPRING_DATA_MONGODB_PORT}/${SPRING_DATA_MONGODB_DATABASE}?authSource=${SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE}

# Habilitar creación automática de índices
spring.data.mongodb.auto-index-creation=true

# ===================================================================
# DOCUMENTACIÓN - SWAGGER / OPENAPI
# ===================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs


